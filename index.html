function storeKey(){return (S.user&&S.user.sub)?('pft_v2_'+S.user.sub):'pft_v2';}
function persist(){const o={_v:DATA_VERSION};PERSIST.forEach(k=>o[k]=S[k]);try{localStorage.setItem(storeKey(),JSON.stringify(o));}catch(e){}}
function decodeJwt(t){try{return JSON.parse(decodeURIComponent(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));}catch(e){return null;}}
function loadDataForUser(){let stored=null;try{stored=JSON.parse(localStorage.getItem(storeKey())||'null');}catch(e){}if(stored&&stored._v===DATA_VERSION){const p={};PERSIST.forEach(k=>{if(stored[k]!==undefined)p[k]=stored[k];});S={...S,...p};}else{S={...S,...makeSeed()};persist();}}
function onGoogleCredential(resp){const p=decodeJwt(resp.credential);if(!p)return;const user={sub:p.sub,name:p.name||'',email:p.email||'',picture:p.picture||''};try{localStorage.setItem('df_session',JSON.stringify(user));}catch(e){}S.user=user;S.authed=true;loadDataForUser();S._ready=true;render();applyRecurring();}
function continueGuest(){try{localStorage.setItem('df_session',JSON.stringify({guest:true}));}catch(e){}S.user=null;S.authed=true;loadDataForUser();S._ready=true;render();applyRecurring();}

function initGoogle(){if(!GOOGLE_CLIENT_ID)return;const go=()=>{if(window.google&&google.accounts&&google.accounts.id){try{google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:onGoogleCredential});const el=document.getElementById('g-btn');if(el)google.accounts.id.renderButton(el,{theme:'filled_blue',size:'large',shape:'pill',text:'continue_with',width:260});}catch(e){}}else{setTimeout(go,300);}};go();}

function isoDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function today(){return isoDate(new Date());}
function fmt(n,dec){const code=S.currency.code;const d=dec==null?0:dec;try{return new Intl.NumberFormat(undefined,{style:'currency',currency:code,minimumFractionDigits:d,maximumFractionDigits:d}).format(n||0);}catch(e_){return sym()+Math.round(n||0).toLocaleString();}}
function sym(){const code=S.currency.code;try{const p=new Intl.NumberFormat(undefined,{style:'currency',currency:code}).formatToParts(0);const s=p.find(x=>x.type==='currency');return s?s.value:code;}catch(e_){return code;}}
function symFor(code){try{const p=new Intl.NumberFormat(undefined,{style:'currency',currency:code}).formatToParts(0);const s=p.find(x=>x.type==='currency');return s?s.value:code;}catch(e_){return code;}}
function groupAmt(str){if(str==null)return'0';const[i,d]=String(str).split('.');const gi=Number(i||0).toLocaleString('en-US');return d!=null?gi+'.'+d:gi;}
function fmtDate(s){try{return new Date(s+'T00:00').toLocaleDateString(undefined,{day:'numeric',month:'short'});}catch(e_){return s;}}
function sumTx(list,type){return list.filter(t=>t.type===type).reduce((a,t)=>a+(+t.amount||0),0);}
function hexA(hex,a){const n=parseInt(hex.slice(1),16);return'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
function darken(hex){const n=parseInt(hex.slice(1),16);return'rgb('+Math.round(((n>>16)&255)*.6)+','+Math.round(((n>>8)&255)*.6)+','+Math.round((n&255)*.6)+')';}
function catColor(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return CATPAL[h%CATPAL.length];}
function bounds(){const now=new Date();const y=now.getFullYear(),mo=String(now.getMonth()+1).padStart(2,'0');const r=S.range;if(r==='week'){const s=new Date(now);s.setDate(now.getDate()-6);return[isoDate(s),today()];}if(r==='month')return[y+'-'+mo+'-01',y+'-'+mo+'-31'];if(r==='year')return[y+'-01-01',y+'-12-31'];if(r==='custom')return[S.customFrom||'0000-01-01',S.customTo||'9999-12-31'];return['0000-01-01','9999-12-31'];}
function inRange(){const[a,b]=bounds();return S.tx.filter(t=>t.date>=a&&t.date<=b);}
function bucketVal(b){return(b.base||0)+S.tx.filter(t=>t.bucket===b.id).reduce((a,t)=>a+(+t.amount||0),0);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── FINANCIAL YEAR + INDIA TAX (FY 2025-26 / AY 2026-27 rules) ──
function currentFYStart(){const n=new Date();return n.getMonth()>=3?n.getFullYear():n.getFullYear()-1;}
function fyLabel(sy){return sy+'-'+String((sy+1)%100).padStart(2,'0');}
function fyList(){const c=currentFYStart();const out=[];for(let y=c;y>=c-5;y--)out.push(fyLabel(y));return out;}
function fyStartYearOf(label){return parseInt(label.slice(0,4),10);}
function fyBounds(label){const sy=fyStartYearOf(label);return[sy+'-04-01',(sy+1)+'-03-31'];}
function activeFY(){return S.taxFY||fyLabel(currentFYStart()-1);} // default = last completed FY
function slabTax(t,slabs){let tax=0,prev=0;for(const[lim,rate]of slabs){if(t>lim){tax+=(lim-prev)*rate;prev=lim;}else{tax+=(t-prev)*rate;break;}}return Math.max(0,tax);}
function surcharge(tax,inc,isNew){let r=0;if(inc>50000000)r=isNew?0.25:0.37;else if(inc>20000000)r=0.25;else if(inc>10000000)r=0.15;else if(inc>5000000)r=0.10;return tax*r;}
const NEW_SLABS=[[400000,0],[800000,.05],[1200000,.10],[1600000,.15],[2000000,.20],[2400000,.25],[Infinity,.30]];
const OLD_SLABS=[[250000,0],[500000,.05],[1000000,.20],[Infinity,.30]];
function computeTax(gross,salaried,deduct){
  // NEW regime (FY 2025-26): only standard deduction; 87A makes tax nil up to 12L taxable.
  const stdN=salaried?75000:0;const taxN=Math.max(0,gross-stdN);
  const rawN=slabTax(taxN,NEW_SLABS);
  // 87A rebate up to ₹12L taxable; marginal relief just above the threshold.
  const baseN=taxN<=1200000?0:Math.min(rawN,taxN-1200000);
  const surN=surcharge(baseN,taxN,true);const cessN=(baseN+surN)*0.04;const totN=Math.round(baseN+surN+cessN);
  // OLD regime (FY 2025-26): standard deduction + chapter VI-A deductions; 87A nil up to 5L.
  const stdO=salaried?50000:0;const taxO=Math.max(0,gross-stdO-(deduct||0));
  let baseO=slabTax(taxO,OLD_SLABS);if(taxO<=500000)baseO=0;
  const surO=surcharge(baseO,taxO,false);const cessO=(baseO+surO)*0.04;const totO=Math.round(baseO+surO+cessO);
  return{taxableNew:taxN,baseNew:Math.round(baseN),cessNew:Math.round(surN+cessN),totalNew:totN,taxableOld:taxO,baseOld:Math.round(baseO),cessOld:Math.round(surO+cessO),totalOld:totO};
}
// ── BILL EXTRACTION (best-effort, client side) ──
function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector('script[data-x="'+src+'"]'))return res();const s=document.createElement('script');s.src=src;s.async=true;s.dataset.x=src;s.onload=()=>res();s.onerror=()=>rej(new Error('load failed'));document.head.appendChild(s);});}
function readAB(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsArrayBuffer(file);});}
function parseBill(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const num=s=>parseFloat(String(s).replace(/[,\s₹]/g,''));
  const numRe=/(\d{1,3}(?:[,\d]{0,12})(?:\.\d{1,2})?)/g;
  let amount=null;
  const keyLines=lines.filter(l=>/total|amount\s*(payable|due)|grand\s*total|net\s*(amount|payable)|balance\s*due/i.test(l));
  const pickMax=arr=>{let best=null;arr.forEach(l=>{const m=l.match(numRe);if(m)m.forEach(x=>{const v=num(x);if(v>0&&v<1e9&&(best==null||v>best))best=v;});});return best;};
  amount=pickMax(keyLines);
  if(amount==null)amount=pickMax(lines);
  let date=null;
  const dm=text.match(/(\b[0-3]?\d)[\/\-.\s]([01]?\d)[\/\-.\s](\d{4}|\d{2})\b/);
  const iso=text.match(/\b(\d{4})-(\d{2})-(\d{2})\b/);
  const mon=text.match(/\b([0-3]?\d)\s*[-\s]?\s*(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s*,?\s*(\d{4})\b/i);
  const MN={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  if(iso)date=iso[1]+'-'+iso[2]+'-'+iso[3];
  else if(mon){const y=mon[3];date=y+'-'+String(MN[mon[2].toLowerCase()]).padStart(2,'0')+'-'+String(mon[1]).padStart(2,'0');}
  else if(dm){let y=dm[3];if(y.length===2)y='20'+y;date=y+'-'+String(dm[2]).padStart(2,'0')+'-'+String(dm[1]).padStart(2,'0');}
  let note=null;
  for(const l of lines){if(l.length>2&&l.length<40&&/[a-z]/i.test(l)&&!/total|invoice|receipt|gst|tax|date|bill|amount/i.test(l)){note=l.replace(/[^\w\s&.\-]/g,'').trim();break;}}
  return{amount:amount!=null?Math.round(amount*100)/100:null,date,note};
}
async function extractBill(file){
  const name=(file.name||'').toLowerCase();const type=file.type||'';
  if(type.startsWith('image/')||/\.(png|jpe?g|webp|bmp|gif|heic)$/.test(name)){
    await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
    const r=await window.Tesseract.recognize(file,'eng');return r.data.text||'';
  }
  if(type==='application/pdf'||/\.pdf$/.test(name)){
    await loadScript('https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js');
    const pdfjs=window.pdfjsLib;pdfjs.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const ab=await readAB(file);const pdf=await pdfjs.getDocument({data:ab}).promise;let out='';
    for(let i=1;i<=Math.min(pdf.numPages,5);i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();out+='\n'+tc.items.map(it=>it.str).join(' ');}
    return out;
  }
  if(/\.docx?$/.test(name)||type.indexOf('word')>=0||type.indexOf('officedocument')>=0){
    await loadScript('https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js');
    const ab=await readAB(file);const r=await window.mammoth.extractRawText({arrayBuffer:ab});return r.value||'';
  }
  throw new Error('Unsupported file type');
}
function scanBill(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*,.pdf,.doc,.docx,application/pdf';
  inp.onchange=async()=>{const f=inp.files&&inp.files[0];if(!f)return;
    setState({sheetOpen:true,editingId:null,scanBusy:true,scanMsg:'Reading "'+f.name+'"…'});
    try{const text=await extractBill(f);const g=parseBill(text);
      setState(s=>({scanBusy:false,scanMsg:g.amount!=null?('Found '+sym()+g.amount.toLocaleString()+(g.date?' · '+g.date:'')+' — review & save'):'No amount detected — please enter it manually.',draft:{...s.draft,amount:g.amount!=null?String(g.amount):s.draft.amount,date:g.date||s.draft.date||today(),note:g.note||s.draft.note}}));
    }catch(e){setState({scanBusy:false,scanMsg:'Couldn’t read this file ('+(navigator.onLine?'try a clearer image/PDF':'needs internet for the first scan')+').'});}
  };
  inp.click();
}
function downloadBackup(){const data={_v:DATA_VERSION,exportedAt:new Date().toISOString()};PERSIST.forEach(k=>data[k]=S[k]);const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='desi-finance-backup-'+today()+'.json';a.click();}
function restoreBackup(){const inp=document.createElement('input');inp.type='file';inp.accept='application/json,.json';inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d||!Array.isArray(d.tx))throw 0;if(!window.confirm('Restore this backup? It will replace your current data.'))return;const p={};PERSIST.forEach(k=>{if(d[k]!==undefined)p[k]=d[k];});setState({...p,tab:'home',moreView:null});persist();}catch(e){window.alert('That file is not a valid Desi Finance backup.');}};r.readAsText(f);};inp.click();}

function makeSeed(){
// Empty starting state for a new user: no transactions, no fake amounts.

return{tx:[],buckets:[{id:'sip',name:'SIP / Mutual Funds',base:0,goal:0,color:'#1E875A'},{id:'gold',name:'Gold',base:0,goal:0,color:'#B5892E'},{id:'epf',name:'EPF',base:0,goal:0,color:'#2D7DA8'},{id:'emg',name:'Emergency Fund',base:0,goal:0,color:'#C0452F'}],categories:{expense:['Food','Groceries','Rent','Bills','Transport','Shopping','Dining','Health','Entertainment','Education','Travel','Subscriptions','Other'],income:['Salary','Freelance','Bonus','Interest','Rental','Gift','Refund','Other']},budgets:{},recurring:[],currency:{code:'INR'},accent:'#B5892E'};}

function applyRecurring(){const now=new Date();const y=now.getFullYear(),mo=now.getMonth();const mk=y+'-'+String(mo+1).padStart(2,'0');let changed=false;const tx=S.tx.slice();(S.recurring||[]).forEach(r=>{if(r.day>now.getDate())return;const exists=tx.some(t=>t.recId===r.id&&t.date.slice(0,7)===mk);if(!exists){tx.unshift({id:Date.now()+Math.random(),recId:r.id,type:r.type,amount:r.amount,category:r.category,bucket:null,note:'Recurring',account:'Auto',date:y+'-'+String(mo+1).padStart(2,'0')+'-'+String(r.day).padStart(2,'0')});changed=true;}});if(changed)set({tx});}

function mapTx(t){const tc=t.type==='income'?C.inc:(t.type==='expense'?catColor(t.category):C.save);return{sid:String(t.id),category:t.category,initial:(t.category||'?').charAt(0).toUpperCase(),sub:t.note?t.note:(t.type==='saving'?'Saved':(t.account||t.type)),amountFmt:(t.type==='income'?'+':(t.type==='expense'?'-':'•'))+' '+fmt(t.amount),amtColor:t.type==='income'?C.inc:(t.type==='expense'?C.exp:C.save),tint:tc,tintBg:hexA(tc,0.14),dateFmt:fmtDate(t.date)};}

  const sorted=S.tx.slice().sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:b.id-a.id);
  const results=(q?sorted.filter(t=>(t.category||'').toLowerCase().includes(q)||(t.note||'').toLowerCase().includes(q)||String(t.amount).includes(q)):sorted.slice(0,40)).map(mapTx);
  return`<div class="search-overlay">

  ${card('New regime',{total:r.totalNew,taxable:r.taxableNew,base:r.baseNew,cess:r.cessNew},better==='new')}

  <div style="font-size:13px;font-weight:700;color:${C.ink};margin-bottom:9px;">FY 2025-26 quick reference</div>
  <div style="font-size:11.5px;color:${C.ink2};line-height:1.7;">
    <b>New regime (default):</b> nil up to ₹4L, then 5/10/15/20/25/30% to ₹24L+. Std. deduction ₹75k. 87A rebate → <b>no tax up to ₹12L</b> taxable (₹12.75L if salaried).<br>
    <b>Old regime:</b> nil up to ₹2.5L, 5% to ₹5L, 20% to ₹10L, 30% above. Std. deduction ₹50k, plus 80C/80D etc. 87A → nil up to ₹5L.<br>
    Both add 4% health &amp; education cess (plus surcharge on high incomes). ITR due ~31 Jul ${fyStartYearOf(fy)+1}.
  </div>
</div>
<div style="text-align:center;color:${C.faint};font-size:10.5px;margin-top:14px;line-height:1.6;">Estimate only — for general planning, not tax advice.<br>Verify with a professional / the Income Tax portal before filing.</div>

// ── MAIN RENDER ──

  if(!S.authed){renderGate();return;}
  const A=S.accent;const showFab=S.tab==='home'||S.tab==='savings'||S.tab==='transactions';
  let content='';
  if(S.tab==='home')content=renderHome();
  else if(S.tab==='transactions')content=renderTransactions();
  else if(S.tab==='insights')content=renderInsights();
  else if(S.tab==='savings')content=renderSavings();
  else if(S.tab==='tax')content=renderTax();
  else if(S.tab==='more')content=renderMore();
  const act=t=>S.tab===t||(t==='more'&&(S.tab==='tax'||S.tab==='savings'||S.tab==='insights'));

<nav class="tab-bar">

// ── EVENTS ──
function g(id){return document.getElementById(id);}
function qall(sel){return document.querySelectorAll(sel);}

function editById(sid){const t=S.tx.find(t=>String(t.id)===sid);if(t)openEdit(t);}
function openEdit(t){setState({sheetOpen:true,editingId:t.id,scanMsg:'',scanBusy:false,draft:{type:t.type,amount:String(t.amount),category:t.bucket?null:t.category,bucket:t.bucket||null,note:t.note||'',date:t.date,account:t.account||'Cash'}});}
function deleteById(sid){if(window.confirm('Delete this transaction?')){setState(s=>({tx:s.tx.filter(x=>String(x.id)!==sid)}));persist();}}
function txTX(el){const m=/translateX\(([-0-9.]+)px\)/.exec(el.style.transform||'');return m?parseFloat(m[1]):0;}
function attachSwipe(){
  qall('.tx-rowswipe').forEach(el=>{
    let x0=0,y0=0,eng=false,base=0;
    el.addEventListener('pointerdown',e=>{x0=e.clientX;y0=e.clientY;base=txTX(el);eng=false;el.dataset.sw='';el.style.transition='none';});
    el.addEventListener('pointermove',e=>{if(e.pointerType==='mouse'&&e.buttons===0)return;const dx=e.clientX-x0,dy=e.clientY-y0;if(!eng){if(Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)){eng=true;try{el.setPointerCapture(e.pointerId);}catch(_){}}else return;}el.dataset.sw='1';let t=Math.max(-104,Math.min(0,base+dx));el.style.transform='translateX('+t+'px)';});
    const settle=()=>{el.style.transition='transform .18s cubic-bezier(.2,.8,.2,1)';const t=txTX(el);el.style.transform='translateX('+(t<-52?-96:0)+'px)';};
    el.addEventListener('pointerup',settle);el.addEventListener('pointercancel',settle);
  });
}
function exportTax(){const fy=activeFY();const[fa,fb]=fyBounds(fy);const earned=sumTx(S.tx.filter(t=>t.date>=fa&&t.date<=fb),'income');const gross=S.taxGross!==''?(parseFloat(S.taxGross)||0):earned;const deduct=S.taxDeduct!==''?(parseFloat(S.taxDeduct)||0):0;const r=computeTax(gross,S.taxSalaried,deduct);const better=r.totalNew<=r.totalOld?'New regime':'Old regime';const rows=[['Desi Finance - Tax Summary'],['Financial Year','FY '+fy],['Assessment Year','AY '+fyLabel(fyStartYearOf(fy)+1)],['Currency',S.currency.code],[''],['Gross income',gross],['Salaried (standard deduction)',S.taxSalaried?'Yes':'No'],['Old-regime deductions',deduct],[''],['','New regime','Old regime'],['Taxable income',r.taxableNew,r.taxableOld],['Tax before cess',r.baseNew,r.baseOld],['Cess + surcharge',r.cessNew,r.cessOld],['Total tax',r.totalNew,r.totalOld],[''],['Recommended',better],['Note','Estimate only - verify before filing.']];const csv=rows.map(x=>x.join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='desi-finance-tax-'+fy+'.csv';a.click();}

  g('sheet-amount')?.addEventListener('input',ev=>{S.draft.amount=ev.target.value;const d=S.draft;const ok=(parseFloat(d.amount)||0)>0&&(d.type==='saving'?!!d.bucket:!!d.category);const b=g('save-tx');if(b){b.style.background=ok?S.accent:C.inset;b.style.color=ok?'#fff':C.faint;b.style.boxShadow=ok?'0 10px 24px '+hexA(S.accent,0.32):'none';}});

  // bucket sheet

  // savings
  g('go-add-bucket')?.addEventListener('click',()=>setState({bucketSheetOpen:true,bucketForm:{name:'',base:'',goal:'',color:'#B5892E'}}));
  qall('.contribute-btn').forEach(el=>el.addEventListener('click',()=>setState({sheetOpen:true,editingId:null,draft:{type:'saving',amount:'0',category:null,bucket:el.dataset.bid,note:'',date:today(),account:'Bank'}})));
  // insights
  qall('.range-chip').forEach(el=>el.addEventListener('click',()=>setState({range:el.dataset.range})));
  g('ins-from')?.addEventListener('change',ev=>setState({customFrom:ev.target.value}));
  g('ins-to')?.addEventListener('change',ev=>setState({customTo:ev.target.value}));
  // more main
  g('go-more-main')?.addEventListener('click',()=>setState({moreView:null}));
  g('export-csv')?.addEventListener('click',()=>{const rows=[['Date','Type','Category','Amount','Account','Note']];S.tx.slice().sort((a,b)=>a.date<b.date?1:-1).forEach(t=>rows.push([t.date,t.type,t.category,t.amount,t.account||'',(t.note||'').replace(/,/g,';')]));const csv=rows.map(r=>r.join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='desi-finance-export.csv';a.click();});
  g('reset-data')?.addEventListener('click',()=>{if(window.confirm('Erase all transactions and start fresh?')){setState({...makeSeed(),tab:'home',moreView:null});persist();}});
  g('menu-currency')?.addEventListener('click',()=>setState({moreView:'currency'}));
  g('menu-categories')?.addEventListener('click',()=>setState({moreView:'categories'}));
  g('menu-budgets')?.addEventListener('click',()=>setState({moreView:'budgets'}));
  g('menu-recurring')?.addEventListener('click',()=>setState({moreView:'recurring'}));
  g('menu-theme')?.addEventListener('click',()=>setState({moreView:'theme'}));
  // currency
  g('cur-search')?.addEventListener('input',ev=>setState({curSearch:ev.target.value}));
  qall('.pick-currency').forEach(el=>el.addEventListener('click',()=>{set({currency:{code:el.dataset.code}});setState({moreView:null});}));
  // categories
  g('cat-input')?.addEventListener('change',ev=>setState({catInput:ev.target.value}));
  g('toggle-cat-type')?.addEventListener('click',()=>setState(s=>({catType:s.catType==='expense'?'income':'expense'})));
  g('add-category')?.addEventListener('click',()=>{const v=S.catInput.trim();if(!v)return;setState(s=>{const c={...s.categories};const arr=c[s.catType].slice();if(!arr.includes(v))arr.push(v);c[s.catType]=arr;return{categories:c,catInput:''};});persist();});
  qall('.remove-cat').forEach(el=>el.addEventListener('click',ev=>{ev.stopPropagation();const type=el.dataset.ctype,name=el.dataset.cname;setState(s=>{const c={...s.categories};c[type]=c[type].filter(x=>x!==name);return{categories:c};});persist();}));
  // budgets
  qall('.budget-input').forEach(el=>el.addEventListener('change',ev=>{const cat=el.dataset.bcat;const n=parseFloat(ev.target.value)||0;setState(s=>{const b={...s.budgets};if(n>0)b[cat]=n;else delete b[cat];return{budgets:b};});persist();}));
  // recurring
  g('rec-expense')?.addEventListener('click',()=>setState({recFormType:'expense'}));
  g('rec-income')?.addEventListener('click',()=>setState({recFormType:'income'}));
  g('rec-cat')?.addEventListener('change',ev=>setState(s=>({recForm:{...s.recForm,category:ev.target.value}})));
  g('rec-amt')?.addEventListener('change',ev=>setState(s=>({recForm:{...s.recForm,amount:ev.target.value}})));
  g('rec-day')?.addEventListener('change',ev=>setState(s=>({recForm:{...s.recForm,day:ev.target.value}})));
  g('add-recurring')?.addEventListener('click',()=>{const f=S.recForm;const amt=parseFloat(f.amount)||0;if(!f.category.trim()||amt<=0)return;let day=parseInt(f.day)||1;day=Math.max(1,Math.min(28,day));setState(s=>({recurring:[...s.recurring,{id:'r'+Date.now(),type:s.recFormType,category:f.category.trim(),amount:amt,day}],recForm:{category:'',amount:'',day:'1'}}));persist();applyRecurring();});
  qall('.remove-recurring').forEach(el=>el.addEventListener('click',()=>{setState(s=>({recurring:s.recurring.filter(r=>r.id!==el.dataset.rid)}));persist();}));
  // themes
  qall('.pick-theme').forEach(el=>el.addEventListener('click',()=>set({accent:el.dataset.tcolor})));
  // tax
  qall('.tax-fy').forEach(el=>el.addEventListener('click',()=>setState({taxFY:el.dataset.fy})));
  g('tax-gross')?.addEventListener('change',ev=>setState({taxGross:ev.target.value}));
  g('tax-salaried')?.addEventListener('change',ev=>setState({taxSalaried:ev.target.checked}));
  g('tax-deduct')?.addEventListener('change',ev=>setState({taxDeduct:ev.target.value}));
  g('tax-export')?.addEventListener('click',exportTax);
  // backup
  g('backup-download')?.addEventListener('click',downloadBackup);
  g('backup-restore')?.addEventListener('click',restoreBackup);
  // account
  g('sign-out')?.addEventListener('click',signOut);
  g('go-signin')?.addEventListener('click',()=>{S.authed=false;render();});
  // swipe-to-delete
  attachSwipe();
}

// ── INIT ──
(function(){
  let sess=null;
  try{sess=JSON.parse(localStorage.getItem('df_session')||'null');}catch(e_){}
  if(sess&&sess.sub){S.user={sub:sess.sub,name:sess.name,email:sess.email,picture:sess.picture};S.authed=true;}
  else if(sess&&sess.guest){S.authed=true;}
  if(S.authed){loadDataForUser();S._ready=true;render();applyRecurring();}
  else{S._ready=true;render();}
})();

// Register the service worker for offline support (no-op on file:// or unsupported browsers).
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
